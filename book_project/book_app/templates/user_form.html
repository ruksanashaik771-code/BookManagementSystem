<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>forms</title>
</head>
<body>
<form method="POST">
    {% csrf_token %}
    <input name="id" placeholder="enter your id" type="text"><br><br>
    <input name="name" placeholder="enter your name" type="text"><br><br>
    <input name="email" placeholder="enter your email" type="email"><br><br>
    <button type="submit">Submit </button>

</form>

</body>
</html>
